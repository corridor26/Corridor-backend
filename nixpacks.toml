# aptPkgs ADDS to Railway's default Node.js setup; nixPkgs replaces it (breaks npm)
# chromium is installed here so PUPPETEER_SKIP_CHROMIUM_DOWNLOAD can skip the 170MB download
[phases.setup]
aptPkgs = [
  "chromium",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libxkbcommon0",
  "libgbm1",
  "libpangocairo-1.0-0",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libxcb1",
  "libasound2t64",
  "libexpat1",
  "libglib2.0-0",
  "libgtk-3-0",
  "libxshmfence1"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
